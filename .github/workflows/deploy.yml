name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H 91.210.171.176 >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts
      
      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 root@91.210.171.176 << 'ENDSSH'
            set -e
            echo "🚀 Начало деплоя..."
            
            cd /var/www/newformat_tour
            
            # Сохранить текущий коммит для сравнения
            PREV_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "")
            
            # Настроить Git безопасность
            git config --global --add safe.directory /var/www/newformat_tour 2>/dev/null || true
            
            # Обновить код из Git
            echo "📥 Обновление из GitHub..."
            git fetch origin main --quiet
            NEW_COMMIT=$(git rev-parse origin/main)
            git reset --hard origin/main --quiet
            
            # Проверка изменений файлов
            PACKAGE_CHANGED=true
            SCHEMA_CHANGED=true
            
            if [ -n "$PREV_COMMIT" ] && [ "$PREV_COMMIT" != "$NEW_COMMIT" ]; then
              if git diff --quiet "$PREV_COMMIT" "$NEW_COMMIT" -- package.json package-lock.json 2>/dev/null; then
                PACKAGE_CHANGED=false
              fi
              if git diff --quiet "$PREV_COMMIT" "$NEW_COMMIT" -- prisma/schema.prisma 2>/dev/null; then
                SCHEMA_CHANGED=false
              fi
            fi
            
            # Обновить зависимости только если изменились
            if [ "$PACKAGE_CHANGED" = true ] || [ ! -d node_modules ]; then
              echo "📦 Установка зависимостей..."
              rm -rf node_modules 2>/dev/null || true
              npm ci --silent --no-audit --no-fund --prefer-offline 2>&1 | grep -v "^npm WARN" || true
            else
              echo "✅ Зависимости не изменились, пропускаем установку"
            fi
            
            # Применение миграций (только если изменилась схема)
            if [ "$SCHEMA_CHANGED" = true ]; then
              echo "🗄️ Применение миграций..."
              npx prisma db push --accept-data-loss --skip-generate 2>&1 | grep -v "^Environment\|^Prisma schema\|^Datasource\|^Tip:" || true
            else
              echo "✅ Prisma схема не изменилась, пропускаем миграции"
            fi
            
            # Генерация Prisma Client (после npm ci он уже в node_modules, только генерируем код)
            echo "🔧 Генерация Prisma Client..."
            npx prisma generate 2>&1 | grep -v "^Start by importing\|^Tip:" || true
            
            # Сборка проекта
            echo "🏗️ Сборка проекта..."
            NODE_OPTIONS="--max-old-space-size=1536" npm run build --silent 2>&1 | grep -v "^npm WARN\|^Start by importing\|^Tip:" || true
            
            # Перезапуск приложения
            echo "🔄 Перезапуск приложения..."
            pm2 restart newformat-tour --silent 2>/dev/null || pm2 start npm --name "newformat-tour" -- start --silent 2>/dev/null

            # Автозапуск после перезагрузки сервера (systemd + resurrect)
            echo "🧩 Настройка автозапуска PM2..."
            if command -v pm2 >/dev/null 2>&1; then
              pm2 save --silent 2>/dev/null || true
              if command -v systemctl >/dev/null 2>&1; then
                pm2 startup systemd -u root --hp /root >/dev/null 2>&1 || true
                systemctl enable pm2-root >/dev/null 2>&1 || true
                systemctl restart pm2-root >/dev/null 2>&1 || true
              fi
            fi
            
            echo "✅ Деплой завершен!"
          ENDSSH
      
      - name: Health check
        timeout-minutes: 2
        run: |
          sleep 5
          curl -f --max-time 10 https://new-format-spb.ru || exit 1
          echo "✅ Сайт работает!"
